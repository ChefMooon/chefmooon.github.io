# =============================================================================
# English UI Strings
# =============================================================================
# This file contains all translatable UI strings for the site.
# To add a new language, copy this file to _data/i18n/{lang_code}/strings.yml
# and translate the values.
# =============================================================================

# Mod titles & descriptions (used in mod cards, listings, nav)
# Non-translatable metadata (icons, versions, URLs) stays in minecraft_mods.yml.
mods:
  breezebounce:
    title: "Breeze Bounce"
    description: "Bounce on breeze rods with a springy new block that launches players into the air."
  colourfulclocks:
    title: "Colourful Clocks"
    description: "Dye your clocks in any of the 16 Minecraft colours to match your build aesthetic."
  differentdoors:
    title: "Different Doors"
    description: "Dozens of new door styles — glass panels, barn doors, jail gates and more."
  frightsdelight:
    title: "Fright's Delight"
    description: "A Farmer's Delight add-on full of spooky seasonal food and Halloween-themed recipes."
  playfulplanes:
    title: "Playful Planes"
    description: "Craft and fly paper planes — fold them, throw them, and watch them glide."
  ubesdelight:
    title: "Ube's Delight"
    description: "A Farmer's Delight add-on celebrating Filipino cuisine, featuring ube, halo-halo, and more."

