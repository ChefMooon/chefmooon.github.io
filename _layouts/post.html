---
layout: default
---

<article class="mod-changelog-post" style="padding: 2rem 0 4rem;">
  <div class="container">
    <header class="post-header">
      <h1 class="post-title">{{ page.title | escape }}</h1>
      <p class="post-meta">
        {{ page.date | date: "%b %-d, %Y" }}
        {%- if page.author -%}
          <span> • {{ page.author }}</span>
        {%- endif -%}
      </p>
    </header>

    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
